<!doctype html>
<html
  lang="zh-CN"
  data-composition-variables='[
    {"id":"brand","type":"string","label":"品牌徽标","default":"影刀 × Centaur Loop"},
    {"id":"ctaText","type":"string","label":"CTA 按钮文字","default":"Star 我们的仓库"},
    {"id":"accent","type":"color","label":"主色","default":"#7c3aed"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #f5f3ff;
        font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
      }

      #root {
        width: 1080px;
        height: 1920px;
        background: linear-gradient(180deg, #f5f3ff 0%, #ede9fe 45%, #ddd6fe 100%);
        position: relative;
        overflow: hidden;
      }

      .glow {
        position: absolute;
        top: -200px;
        right: -200px;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.35) 0%, transparent 70%);
        pointer-events: none;
      }
      .glow-2 {
        position: absolute;
        bottom: -150px;
        left: -150px;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.3) 0%, transparent 70%);
        pointer-events: none;
      }

      /* ===== Stage-14 SVG 装饰层(科技感氛围)===== */
      .decor {
        position: absolute;
        z-index: 2;
        pointer-events: none;
      }
      .decor-code {
        top: 380px;
        left: 80px;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        font-size: 96px;
        font-weight: 700;
        color: rgba(124, 58, 237, 0.18);
        letter-spacing: -0.05em;
      }
      .decor-nodes {
        bottom: 360px;
        right: 60px;
      }
      .decor-orbit {
        top: 600px;
        right: 100px;
        width: 220px;
        height: 220px;
      }
      .decor-bracket {
        bottom: 480px;
        left: 100px;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        font-size: 72px;
        font-weight: 700;
        color: rgba(124, 58, 237, 0.14);
      }
      .decor-bar {
        position: absolute;
        background: linear-gradient(90deg, rgba(124, 58, 237, 0.6) 0%, transparent 100%);
        height: 2px;
        border-radius: 1px;
        z-index: 2;
        pointer-events: none;
      }
      .decor-bar.b1 {
        top: 480px;
        right: 80px;
        width: 240px;
      }
      .decor-bar.b2 {
        bottom: 540px;
        left: 80px;
        width: 320px;
      }
      .decor-tag {
        position: absolute;
        z-index: 2;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
        font-size: 22px;
        color: rgba(109, 40, 217, 0.55);
        padding: 6px 14px;
        border: 1px solid rgba(124, 58, 237, 0.25);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(8px);
        pointer-events: none;
        white-space: nowrap;
      }
      .decor-tag.t1 {
        top: 720px;
        left: 120px;
      }
      .decor-tag.t2 {
        bottom: 700px;
        right: 90px;
      }

      /* 顶部 badge,常驻 */
      .badge-stage {
        position: absolute;
        top: 160px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        padding: 16px 36px;
        border-radius: 60px;
        border: 1px solid rgba(124, 58, 237, 0.18);
      }
      .badge .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent, #7c3aed);
      }
      .badge .badge-text {
        font-size: 32px;
        color: #6d28d9;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      /* Caption 主舞台 — 中心位置,所有 caption 叠放 */
      .caption-stage {
        position: absolute;
        inset: 0;
        z-index: 4;
      }
      .caption {
        position: absolute;
        left: 80px;
        right: 80px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 116px;
        font-weight: 800;
        color: #4c1d95;
        line-height: 1.15;
        letter-spacing: -0.02em;
        text-align: center;
        opacity: 0;
      }
      .caption.small {
        font-size: 96px;
      }
      .caption .brand {
        background: linear-gradient(135deg, var(--accent, #7c3aed) 0%, #a78bfa 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* CTA 区(最后一段一起出现) */
      .cta-row {
        position: absolute;
        bottom: 280px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        opacity: 0;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        background: var(--accent, #7c3aed);
        color: white;
        padding: 28px 56px;
        border-radius: 100px;
        font-size: 44px;
        font-weight: 600;
        box-shadow: 0 20px 50px -15px rgba(124, 58, 237, 0.5);
      }
      .pill .arrow {
        font-size: 38px;
      }

      /* 底部进度条 */
      .progress {
        position: absolute;
        bottom: 100px;
        left: 80px;
        right: 80px;
        height: 8px;
        background: rgba(124, 58, 237, 0.15);
        border-radius: 4px;
        overflow: hidden;
        z-index: 5;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #7c3aed 0%, #a78bfa 100%);
        transform-origin: left center;
        transform: scaleX(0);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-width="1080"
      data-height="1920"
    >
      <div class="glow"></div>
      <div class="glow-2"></div>

      <!-- ===== SVG 装饰层(背景增强) ===== -->
      <div class="decor decor-code" aria-hidden>&lt;/&gt;</div>
      <div class="decor decor-bracket" aria-hidden>{ }</div>

      <svg class="decor decor-nodes" width="200" height="200" viewBox="0 0 100 100" aria-hidden>
        <line x1="20" y1="20" x2="80" y2="50" stroke="rgba(124,58,237,0.32)" stroke-width="1.2"/>
        <line x1="80" y1="50" x2="30" y2="82" stroke="rgba(124,58,237,0.32)" stroke-width="1.2"/>
        <line x1="30" y1="82" x2="20" y2="20" stroke="rgba(124,58,237,0.32)" stroke-width="1.2"/>
        <line x1="80" y1="50" x2="20" y2="20" stroke="rgba(124,58,237,0.18)" stroke-width="0.8"/>
        <circle cx="20" cy="20" r="3.5" fill="rgba(124,58,237,0.7)"/>
        <circle cx="80" cy="50" r="3.5" fill="rgba(124,58,237,0.7)"/>
        <circle cx="30" cy="82" r="3.5" fill="rgba(124,58,237,0.7)"/>
      </svg>

      <svg class="decor decor-orbit" viewBox="0 0 100 100" aria-hidden>
        <circle cx="50" cy="50" r="38" stroke="rgba(124,58,237,0.22)" stroke-width="0.8" fill="none"/>
        <circle cx="50" cy="50" r="28" stroke="rgba(124,58,237,0.18)" stroke-width="0.6" fill="none" stroke-dasharray="2 4"/>
        <circle cx="88" cy="50" r="4" fill="rgba(124,58,237,0.85)"/>
        <circle cx="50" cy="22" r="3" fill="rgba(167,139,250,0.75)"/>
      </svg>

      <div class="decor-bar b1" aria-hidden></div>
      <div class="decor-bar b2" aria-hidden></div>

      <div class="decor-tag t1" aria-hidden>cycle.feedback()</div>
      <div class="decor-tag t2" aria-hidden>loop.next()</div>

      <!-- Badge:0-14s 常驻(track 0) -->
      <div
        id="brand-badge"
        class="badge-stage clip"
        data-start="0"
        data-duration="15.5"
        data-track-index="0"
      >
        <div class="badge">
          <span class="dot"></span>
          <span class="badge-text" id="v-brand">影刀 × Centaur Loop</span>
        </div>
      </div>

      <!-- Caption 主舞台:14s 内 5 段 GSAP 切换(track 1) -->
      <div
        id="caption-stage"
        class="caption-stage clip"
        data-start="0"
        data-duration="15.5"
        data-track-index="1"
      >
        <h2 class="caption" id="c1">AI Agent 不能只会调用工具</h2>
        <h2 class="caption" id="c2">还要会从真实反馈中学习</h2>
        <h2 class="caption small" id="c3">影刀基于 <span class="brand">Centaur Loop</span></h2>
        <h2 class="caption" id="c4">让每条短视频<br/>都让下一条更聪明</h2>
        <h2 class="caption small" id="c5">开源在 <span class="brand">GitHub</span></h2>
      </div>

      <!-- CTA pill:12.2-15.5s(track 2) -->
      <div
        id="cta-row"
        class="cta-row clip"
        data-start="12.2"
        data-duration="3.3"
        data-track-index="2"
      >
        <div class="pill">
          <span id="v-cta">Star 我们的仓库</span>
          <span class="arrow">→</span>
        </div>
      </div>

      <!-- 进度条:0-14s(track 3) -->
      <div
        id="progress-bar"
        class="progress clip"
        data-start="0"
        data-duration="15.5"
        data-track-index="3"
      >
        <div class="progress-fill"></div>
      </div>

      <!-- 音频:0-14s,中文 TTS 旁白(track 4) -->
      <audio
        id="narration"
        src="./narration-kokoro.wav"
        data-start="0"
        data-duration="15.5"
        data-track-index="4"
        data-volume="0.95"
      ></audio>
    </div>

    <script>
      try {
        const vars = window.__hyperframes && window.__hyperframes.getVariables();
        if (vars) {
          if (vars.brand) document.getElementById("v-brand").textContent = vars.brand;
          if (vars.ctaText) document.getElementById("v-cta").textContent = vars.ctaText;
          if (vars.accent) {
            document.documentElement.style.setProperty("--accent", vars.accent);
          }
        }
      } catch (e) {
        console.warn("hyperframes variables unavailable:", e);
      }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 装饰图层入场
      tl.from(".glow", { scale: 0.6, opacity: 0, duration: 1.4, ease: "power2.out" }, 0);
      tl.from(".glow-2", { scale: 0.6, opacity: 0, duration: 1.6, ease: "power2.out" }, 0.3);
      tl.from(".badge", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);

      // ===== Stage-14 SVG 装饰层入场 + 持续运动 =====
      // 入场:stagger,从 t=0.3 开始
      tl.from(
        [".decor-code", ".decor-bracket", ".decor-nodes", ".decor-orbit", ".decor-bar", ".decor-tag"],
        { opacity: 0, scale: 0.7, duration: 0.9, ease: "power3.out", stagger: 0.12 },
        0.3,
      );
      // 持续浮动 — code 上下
      tl.to(".decor-code", { y: "-=18", duration: 3.0, ease: "sine.inOut", yoyo: true, repeat: 5 }, 0);
      // 持续浮动 — bracket 反向
      tl.to(".decor-bracket", { y: "+=14", duration: 3.5, ease: "sine.inOut", yoyo: true, repeat: 4 }, 0);
      // nodes 缓慢旋转(完整 15s 转 1.5 圈)
      tl.to(".decor-nodes", { rotation: 540, duration: 15, ease: "none", transformOrigin: "50% 50%" }, 0);
      // orbit 反向旋转更慢
      tl.to(".decor-orbit", { rotation: -360, duration: 15, ease: "none", transformOrigin: "50% 50%" }, 0);
      // bar 横向滑动 + 透明度呼吸
      tl.to(".decor-bar.b1", { x: "-=40", opacity: 0.45, duration: 4, ease: "sine.inOut", yoyo: true, repeat: 3 }, 0);
      tl.to(".decor-bar.b2", { x: "+=30", opacity: 0.5, duration: 5, ease: "sine.inOut", yoyo: true, repeat: 2 }, 0);
      // tag 微浮 + 透明度呼吸
      tl.to(".decor-tag", { y: "-=10", opacity: 0.85, duration: 2.5, ease: "sine.inOut", yoyo: true, repeat: 5, stagger: 0.3 }, 0.5);

      // ===== 5 段 caption 与 15.5 秒 Kokoro zf_xiaobei 旁白同步 =====
      // 切分依据:Kokoro 节奏(比 Tingting 慢 ~10%),按句号 / 逗号断
      const segments = [
        { id: "#c1", start: 0.4,  end: 3.2,  enterEase: "power3.out" },
        { id: "#c2", start: 3.4,  end: 6.0,  enterEase: "expo.out" },
        { id: "#c3", start: 6.2,  end: 8.6,  enterEase: "power3.out" },
        { id: "#c4", start: 8.8,  end: 12.0, enterEase: "back.out(1.4)" },
        { id: "#c5", start: 12.2, end: 15.5, enterEase: "power3.out" },
      ];

      segments.forEach(({ id, start, end, enterEase }, idx) => {
        tl.set(id, { autoAlpha: 0, y: 60 }, start - 0.05);
        tl.to(id, { autoAlpha: 1, y: 0, duration: 0.45, ease: enterEase }, start);
        if (idx < segments.length - 1) {
          tl.to(id, { autoAlpha: 0, y: -40, duration: 0.35, ease: "power2.in" }, end - 0.35);
        }
      });

      // CTA pill 跟最后一段 caption 同步入场
      tl.set(".cta-row", { autoAlpha: 0, scale: 0.7 }, 12.2);
      tl.to(".cta-row", { autoAlpha: 1, scale: 1, duration: 0.6, ease: "back.out(1.6)" }, 12.35);

      // 进度条横向填充 15.5s
      tl.fromTo(".progress-fill", { scaleX: 0 }, { scaleX: 1, ease: "none", duration: 15.5 }, 0);

      // 最终 fade out
      tl.to("#root", { opacity: 0, duration: 0.5, ease: "power2.in" }, 15.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
