<!doctype html>
<html
  lang="zh-CN"
  data-composition-variables='[
    {"id":"period","type":"string","label":"周期/期次","default":"2026 第 20 周"},
    {"id":"title","type":"string","label":"标题","default":"本周增长复盘"},
    {"id":"s1Label","type":"string","label":"主 KPI 标签","default":"播放量"},
    {"id":"s1Value","type":"string","label":"主 KPI 值","default":"12,345"},
    {"id":"s1Change","type":"string","label":"主 KPI 变化","default":"↑ 23.5%"},
    {"id":"s2Label","type":"string","label":"次 KPI 1 标签","default":"完播率"},
    {"id":"s2Value","type":"string","label":"次 KPI 1 值","default":"38%"},
    {"id":"s2Change","type":"string","label":"次 KPI 1 变化","default":"↑ 5pt"},
    {"id":"s3Label","type":"string","label":"次 KPI 2 标签","default":"点赞"},
    {"id":"s3Value","type":"string","label":"次 KPI 2 值","default":"892"},
    {"id":"s3Change","type":"string","label":"次 KPI 2 变化","default":"↑ 18%"},
    {"id":"verdict","type":"string","label":"复盘结论","default":"超出基线 8%,前三秒钩子稳定"},
    {"id":"cta","type":"string","label":"CTA","default":"下周继续测试该选题"},
    {"id":"accent","type":"color","label":"主色","default":"#7c3aed"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #f5f3ff;
        font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
      }

      #root {
        width: 1080px;
        height: 1920px;
        background: linear-gradient(180deg, #f5f3ff 0%, #ede9fe 45%, #ddd6fe 100%);
        position: relative;
        overflow: hidden;
      }

      .glow {
        position: absolute;
        top: -250px;
        left: -200px;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
        pointer-events: none;
      }
      .glow-2 {
        position: absolute;
        bottom: -180px;
        right: -150px;
        width: 560px;
        height: 560px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.28) 0%, transparent 70%);
        pointer-events: none;
      }

      .stage {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        padding: 140px 80px;
        display: flex;
        flex-direction: column;
        gap: 36px;
        box-sizing: border-box;
      }

      .header {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .period {
        font-size: 32px;
        color: var(--accent, #7c3aed);
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .title {
        font-size: 108px;
        color: #4c1d95;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.02em;
      }

      .bento {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 2fr 1fr;
        gap: 24px;
      }

      .card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        border-radius: 48px;
        border: 1px solid rgba(124, 58, 237, 0.12);
        padding: 56px 48px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 10px 30px -10px rgba(124, 58, 237, 0.25);
      }
      .card.primary {
        grid-column: 1 / -1;
        background: linear-gradient(135deg, var(--accent, #7c3aed) 0%, #a78bfa 100%);
        color: white;
        border: none;
        box-shadow: 0 20px 50px -15px rgba(124, 58, 237, 0.5);
      }

      .stat-label {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .card.primary .stat-label {
        color: rgba(255, 255, 255, 0.85);
      }
      .card:not(.primary) .stat-label {
        color: #6d28d9;
      }

      .stat-value {
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
        margin-top: 28px;
      }
      .card.primary .stat-value {
        font-size: 156px;
        color: white;
      }
      .card:not(.primary) .stat-value {
        font-size: 96px;
        color: #4c1d95;
      }

      .stat-change {
        font-size: 30px;
        font-weight: 600;
        margin-top: 18px;
        display: inline-block;
        padding: 8px 18px;
        border-radius: 32px;
        align-self: flex-start;
      }
      .card.primary .stat-change {
        background: rgba(255, 255, 255, 0.22);
        color: white;
      }
      .card:not(.primary) .stat-change {
        background: rgba(34, 197, 94, 0.15);
        color: #15803d;
      }

      .footer {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .verdict {
        font-size: 36px;
        color: #5b21b6;
        line-height: 1.4;
        font-weight: 400;
      }
      .pill {
        display: inline-flex;
        align-self: flex-start;
        align-items: center;
        gap: 16px;
        background: var(--accent, #7c3aed);
        color: white;
        padding: 26px 52px;
        border-radius: 100px;
        font-size: 38px;
        font-weight: 600;
        box-shadow: 0 20px 50px -15px rgba(124, 58, 237, 0.5);
      }
      .pill .arrow {
        font-size: 32px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="weekly-stats"
      data-start="0"
      data-width="1080"
      data-height="1920"
    >
      <div class="glow"></div>
      <div class="glow-2"></div>

      <div
        id="main-clip"
        class="stage clip"
        data-start="0"
        data-duration="6"
        data-track-index="0"
      >
        <div class="header">
          <div class="period" id="v-period">2026 第 20 周</div>
          <h1 class="title" id="v-title">本周增长复盘</h1>
        </div>

        <div class="bento">
          <div class="card primary">
            <span class="stat-label" id="v-s1Label">播放量</span>
            <div>
              <div class="stat-value" id="v-s1Value">12,345</div>
              <span class="stat-change" id="v-s1Change">↑ 23.5%</span>
            </div>
          </div>
          <div class="card">
            <span class="stat-label" id="v-s2Label">完播率</span>
            <div>
              <div class="stat-value" id="v-s2Value">38%</div>
              <span class="stat-change" id="v-s2Change">↑ 5pt</span>
            </div>
          </div>
          <div class="card">
            <span class="stat-label" id="v-s3Label">点赞</span>
            <div>
              <div class="stat-value" id="v-s3Value">892</div>
              <span class="stat-change" id="v-s3Change">↑ 18%</span>
            </div>
          </div>
        </div>

        <div class="footer">
          <p class="verdict" id="v-verdict">超出基线 8%,前三秒钩子稳定</p>
          <div class="pill">
            <span id="v-cta">下周继续测试该选题</span>
            <span class="arrow">→</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      try {
        const vars = window.__hyperframes && window.__hyperframes.getVariables();
        if (vars) {
          const setText = (id, v) => {
            if (v != null) document.getElementById(id).textContent = v;
          };
          setText("v-period", vars.period);
          setText("v-title", vars.title);
          setText("v-s1Label", vars.s1Label);
          setText("v-s1Value", vars.s1Value);
          setText("v-s1Change", vars.s1Change);
          setText("v-s2Label", vars.s2Label);
          setText("v-s2Value", vars.s2Value);
          setText("v-s2Change", vars.s2Change);
          setText("v-s3Label", vars.s3Label);
          setText("v-s3Value", vars.s3Value);
          setText("v-s3Change", vars.s3Change);
          setText("v-verdict", vars.verdict);
          setText("v-cta", vars.cta);
          if (vars.accent) {
            document.documentElement.style.setProperty("--accent", vars.accent);
          }
        }
      } catch (e) {
        console.warn("hyperframes variables unavailable:", e);
      }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from(".glow", { scale: 0.6, opacity: 0, duration: 1.2, ease: "power2.out" }, 0);
      tl.from(".glow-2", { scale: 0.6, opacity: 0, duration: 1.4, ease: "power2.out" }, 0.3);

      tl.from(".period", { y: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.from(".title", { y: 40, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.4);

      tl.from(".card.primary", { y: 60, opacity: 0, scale: 0.96, duration: 0.7, ease: "expo.out" }, 0.9);
      tl.from(".card.primary .stat-value", { y: 20, opacity: 0, duration: 0.5, ease: "power3.out" }, 1.2);
      tl.from(".card.primary .stat-change", { scale: 0.7, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, 1.5);

      tl.from(".card:not(.primary)", { y: 50, opacity: 0, duration: 0.6, ease: "power3.out", stagger: 0.15 }, 1.4);
      tl.from(".card:not(.primary) .stat-value", { y: 15, opacity: 0, duration: 0.45, ease: "power2.out", stagger: 0.15 }, 1.6);
      tl.from(".card:not(.primary) .stat-change", { scale: 0.7, opacity: 0, duration: 0.4, ease: "back.out(1.4)", stagger: 0.12 }, 1.85);

      tl.from(".verdict", { y: 30, opacity: 0, duration: 0.6, ease: "power2.out" }, 2.5);
      tl.from(".pill", { scale: 0.75, opacity: 0, duration: 0.6, ease: "back.out(1.5)" }, 2.8);

      tl.to(".pill", { y: -8, duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.4);

      tl.to("#root", { opacity: 0, duration: 0.45, ease: "power2.in" }, 5.45);

      window.__timelines["weekly-stats"] = tl;
    </script>
  </body>
</html>
