<!doctype html>
<html
  lang="zh-CN"
  data-composition-variables='[
    {"id":"badge","type":"string","label":"Badge 顶标","default":"影刀 × HyperFrames"},
    {"id":"eyebrow","type":"string","label":"Eyebrow 小标签","default":"第 1 圈飞轮"},
    {"id":"title1","type":"string","label":"标题第一行","default":"HTML"},
    {"id":"title2","type":"string","label":"标题第二行(强调)","default":"即视频源"},
    {"id":"desc","type":"string","label":"描述文案","default":"data-* 控时间线 · GSAP 控动画 · npx hyperframes render 出 mp4"},
    {"id":"cta","type":"string","label":"CTA 按钮文字","default":"下一圈接 ScriptJson"},
    {"id":"accent","type":"color","label":"主色调","default":"#7c3aed"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #f5f3ff;
        font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
      }

      #root {
        width: 1080px;
        height: 1920px;
        background: linear-gradient(180deg, #f5f3ff 0%, #ede9fe 45%, #ddd6fe 100%);
        position: relative;
        overflow: hidden;
      }

      .glow {
        position: absolute;
        top: -200px;
        right: -200px;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.35) 0%, transparent 70%);
        pointer-events: none;
      }
      .glow-2 {
        position: absolute;
        bottom: -150px;
        left: -150px;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.3) 0%, transparent 70%);
        pointer-events: none;
      }

      .scene-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        height: 100%;
        padding: 200px 100px;
        gap: 36px;
        box-sizing: border-box;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        padding: 16px 32px;
        border-radius: 60px;
        border: 1px solid rgba(124, 58, 237, 0.15);
      }
      .badge .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent, #7c3aed);
      }
      .badge-text {
        font-size: 32px;
        color: #6d28d9;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .eyebrow {
        font-size: 36px;
        color: var(--accent, #7c3aed);
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .title {
        font-size: 168px;
        color: #4c1d95;
        font-weight: 800;
        line-height: 1.02;
        max-width: 900px;
        letter-spacing: -0.02em;
      }
      .title .accent {
        background: linear-gradient(135deg, var(--accent, #7c3aed) 0%, #a78bfa 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .desc {
        font-size: 40px;
        color: #5b21b6;
        line-height: 1.5;
        max-width: 880px;
        font-weight: 400;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 18px;
        background: var(--accent, #7c3aed);
        color: white;
        padding: 32px 64px;
        border-radius: 100px;
        font-size: 48px;
        font-weight: 600;
        margin-top: 60px;
        box-shadow: 0 20px 50px -15px rgba(124, 58, 237, 0.5);
      }
      .pill .arrow {
        font-size: 40px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-width="1080"
      data-height="1920"
    >
      <div class="glow"></div>
      <div class="glow-2"></div>

      <div
        id="main-clip"
        class="scene-content clip"
        data-start="0"
        data-duration="5"
        data-track-index="0"
      >
        <div class="badge">
          <span class="dot"></span>
          <span class="badge-text" id="v-badge">影刀 × HyperFrames</span>
        </div>

        <div class="eyebrow" id="v-eyebrow">第 1 圈飞轮</div>

        <h1 class="title">
          <span id="v-title1">HTML</span>
          <br />
          <span class="accent" id="v-title2">即视频源</span>
        </h1>

        <p class="desc" id="v-desc">
          data-* 控时间线 · GSAP 控动画 · npx hyperframes render 出 mp4
        </p>

        <div class="pill">
          <span id="v-cta">下一圈接 ScriptJson</span>
          <span class="arrow">→</span>
        </div>
      </div>
    </div>

    <script>
      // 读取 variables 注入文案 + 主色;__hyperframes 在某些环境(如 validate)未注入,降级到 HTML 占位文字
      try {
        const vars = window.__hyperframes && window.__hyperframes.getVariables();
        if (vars) {
          const setText = (id, v) => {
            if (v != null) document.getElementById(id).textContent = v;
          };
          setText("v-badge", vars.badge);
          setText("v-eyebrow", vars.eyebrow);
          setText("v-title1", vars.title1);
          setText("v-title2", vars.title2);
          setText("v-desc", vars.desc);
          setText("v-cta", vars.cta);
          if (vars.accent) {
            document.documentElement.style.setProperty("--accent", vars.accent);
          }
        }
      } catch (e) {
        console.warn("hyperframes variables unavailable, using HTML defaults:", e);
      }

      // GSAP 时间线
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from(".glow", { scale: 0.6, opacity: 0, duration: 1.2, ease: "power2.out" }, 0);
      tl.from(".glow-2", { scale: 0.6, opacity: 0, duration: 1.4, ease: "power2.out" }, 0.2);

      tl.from(".badge", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);
      tl.from(".eyebrow", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.5);
      tl.from(".title #v-title1", { y: 80, opacity: 0, duration: 0.7, ease: "expo.out" }, 0.7);
      tl.from(".title .accent", { y: 60, opacity: 0, duration: 0.7, ease: "expo.out" }, 0.9);
      tl.from(".desc", { y: 40, opacity: 0, duration: 0.6, ease: "power2.out" }, 1.2);
      tl.from(".pill", { scale: 0.7, opacity: 0, duration: 0.7, ease: "back.out(1.6)" }, 1.6);
      tl.from(".pill .arrow", { x: -20, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.9);

      tl.to(".pill", { y: -10, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.3);

      tl.to("#root", { opacity: 0, duration: 0.45, ease: "power2.in" }, 4.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
